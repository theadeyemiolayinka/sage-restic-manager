name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: x86_64-apple-darwin
            os: macos-14
          - target: aarch64-apple-darwin
            os: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build (native)
        if: matrix.target == 'x86_64-apple-darwin' || matrix.target == 'aarch64-apple-darwin'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          CRATE_NAME="sage-restic-manager"
          TARGET="${{ matrix.target }}"
          BINARY="target/${TARGET}/release/${CRATE_NAME}"
          PACKAGE="${CRATE_NAME}-${TARGET}"
          mkdir -p "dist"
          cp "${BINARY}" "dist/${PACKAGE}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sage-restic-manager-${{ matrix.target }}
          path: dist/

  sign-and-release:
    name: Sign and Create Release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: sage-restic-manager-*
          merge-multiple: true

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y minisign coreutils

      - name: Import minisign key
        run: |
          echo "${{ secrets.MINISIGN_SECRET_KEY }}" > minisign.key
          echo "${{ secrets.MINISIGN_PUBLIC_KEY }}" > minisign.pub

      - name: Sign and checksum
        run: |
          mkdir -p release
          for bin in artifacts/*; do
            name=$(basename "$bin")
            cp "$bin" "release/${name}"
            sha256sum "release/${name}" > "release/${name}.sha256"
            minisign -Sm "release/${name}" -s minisign.key -x "release/${name}.minisig"
            minisign -Vm "release/${name}" -p minisign.pub -x "release/${name}.minisig"
          done
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
